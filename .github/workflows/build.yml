name: Build ARM64 Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建（跳过上游检测）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      cleanup_old_versions:
        description: '清理旧版本镜像'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # Weekly rebuild on Sunday at 2:00 UTC
    - cron: '0 2 * * 0'

env:
  REGISTRY: ghcr.io
  GITHUB_USER: slashinchi
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # 保留的版本数量
  KEEP_VERSIONS: 5

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      mirofish_changed: ${{ steps.check.outputs.mirofish_changed }}
      openzep_changed: ${{ steps.check.outputs.openzep_changed }}
      should_build: ${{ steps.check.outputs.should_build }}
      mirofish_sha: ${{ steps.check.outputs.mirofish_sha }}
      openzep_sha: ${{ steps.check.outputs.openzep_sha }}
      mirofish_commits: ${{ steps.commits.outputs.mirofish }}
      openzep_commits: ${{ steps.commits.outputs.openzep }}
      has_changes: ${{ steps.commits.outputs.has_changes }}
      mirofish_version: ${{ steps.version.outputs.mirofish_version }}
      openzep_version: ${{ steps.version.outputs.openzep_version }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Load upstream state
        run: |
          if [ ! -f ".github/upstream-state.json" ]; then
            echo '{"mirofish":{"sha":""},"openzep":{"sha":""}}' > .github/upstream-state.json
          fi

      - name: Check upstream changes
        id: check
        run: |
          MIROFISH_SHA=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/commits/main" | jq -r '.sha')
          OPENZEP_SHA=$(curl -s "https://api.github.com/repos/N1nEmAn/openzep/commits/main" | jq -r '.sha')
          
          echo "mirofish_sha=$MIROFISH_SHA" >> $GITHUB_OUTPUT
          echo "openzep_sha=$OPENZEP_SHA" >> $GITHUB_OUTPUT
          
          LAST_MIROFISH_SHA=$(jq -r '.mirofish.sha' .github/upstream-state.json)
          LAST_OPENZEP_SHA=$(jq -r '.openzep.sha' .github/upstream-state.json)
          
          echo "📊 Upstream Status:"
          echo "  MiroFish: $MIROFISH_SHA (last: $LAST_MIROFISH_SHA)"
          echo "  OpenZep:  $OPENZEP_SHA (last: $LAST_OPENZEP_SHA)"
          
          [ "$MIROFISH_SHA" != "$LAST_MIROFISH_SHA" ] && echo "mirofish_changed=true" >> $GITHUB_OUTPUT || echo "mirofish_changed=false" >> $GITHUB_OUTPUT
          [ "$OPENZEP_SHA" != "$LAST_OPENZEP_SHA" ] && echo "openzep_changed=true" >> $GITHUB_OUTPUT || echo "openzep_changed=false" >> $GITHUB_OUTPUT
          
          if [ "${{ github.event_name }}" == "push" ] || [ "${{ inputs.force_build }}" == "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [ "$MIROFISH_SHA" != "$LAST_MIROFISH_SHA" ] || [ "$OPENZEP_SHA" != "$LAST_OPENZEP_SHA" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine version tags
        id: version
        run: |
          BUILD_DATE=$(date -u '+%Y%m%d')
          MIROFISH_SHA="${{ steps.check.outputs.mirofish_sha }}"
          
          # MiroFish: 检查最新 release 是否匹配当前 commit
          MIROFISH_LATEST_RELEASE=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/releases/latest" 2>/dev/null || echo "{}")
          MIROFISH_RELEASE_TAG=$(echo "$MIROFISH_LATEST_RELEASE" | jq -r '.tag_name // empty')
          
          if [ -n "$MIROFISH_RELEASE_TAG" ]; then
            RELEASE_COMMIT=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/git/ref/tags/$MIROFISH_RELEASE_TAG" | jq -r '.object.sha // empty')
            
            if [ "$RELEASE_COMMIT" = "$MIROFISH_SHA" ]; then
              echo "✅ MiroFish commit matches release $MIROFISH_RELEASE_TAG"
              echo "mirofish_version=$MIROFISH_RELEASE_TAG" >> $GITHUB_OUTPUT
            else
              echo "📌 MiroFish has unreleased commits, using date version"
              echo "mirofish_version=$BUILD_DATE" >> $GITHUB_OUTPUT
            fi
          else
            echo "📌 MiroFish no releases found, using date version"
            echo "mirofish_version=$BUILD_DATE" >> $GITHUB_OUTPUT
          fi
          
          echo "openzep_version=$BUILD_DATE" >> $GITHUB_OUTPUT
          
          echo ""
          echo "📦 Version tags:"
          echo "  MiroFish: $(grep mirofish_version $GITHUB_OUTPUT | cut -d= -f2)"
          echo "  OpenZep:  $BUILD_DATE"

      - name: Fetch new commits info
        id: commits
        run: |
          LAST_MIROFISH_SHA=$(jq -r '.mirofish.sha' .github/upstream-state.json)
          LAST_OPENZEP_SHA=$(jq -r '.openzep.sha' .github/upstream-state.json)
          HAS_CHANGES="false"
          
          if [ "${{ steps.check.outputs.mirofish_changed }}" == "true" ] && [ -n "$LAST_MIROFISH_SHA" ]; then
            MIROFISH_COMMITS=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/compare/${LAST_MIROFISH_SHA}...main" | \
              jq -r '.commits[] | "- `\(.sha[:7])` - \(.commit.message | split("\n")[0])"' | head -10)
            if [ -n "$MIROFISH_COMMITS" ]; then
              echo "mirofish<<EOF" >> $GITHUB_OUTPUT
              echo "$MIROFISH_COMMITS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              HAS_CHANGES="true"
            fi
          fi
          
          if [ "${{ steps.check.outputs.openzep_changed }}" == "true" ] && [ -n "$LAST_OPENZEP_SHA" ]; then
            OPENZEP_COMMITS=$(curl -s "https://api.github.com/repos/N1nEmAn/openzep/compare/${LAST_OPENZEP_SHA}...main" | \
              jq -r '.commits[] | "- `\(.sha[:7])` - \(.commit.message | split("\n")[0])"' | head -10)
            if [ -n "$OPENZEP_COMMITS" ]; then
              echo "openzep<<EOF" >> $GITHUB_OUTPUT
              echo "$OPENZEP_COMMITS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              HAS_CHANGES="true"
            fi
          fi
          
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mirofish
            repo: 666ghj/MiroFish
            image: mirofish
            version: ${{ needs.check-upstream.outputs.mirofish_version }}
          - name: openzep
            repo: N1nEmAn/openzep
            image: openzep
            version: ${{ needs.check-upstream.outputs.openzep_version }}

    steps:
      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get upstream SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ matrix.version }}-arm64
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Show tags
        run: |
          echo "### ${{ matrix.name }} 镜像已推送" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "版本: \`${{ matrix.version }}-arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # 清理旧版本镜像
  cleanup:
    needs: build
    if: always() && needs.build.result == 'success' && inputs.cleanup_old_versions == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Clean up old package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 🧹 清理旧版本镜像" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          for IMAGE in mirofish openzep; do
            echo "Cleaning $IMAGE..." >> $GITHUB_STEP_SUMMARY
            
            # 获取所有版本
            VERSIONS=$(gh api --paginate /users/${{ env.GITHUB_USER }}/packages/container/$IMAGE/versions \
              --jq '.[] | {id: .id, created: .created_at, tags: .metadata.container.tags}')
            
            # 统计版本数量
            TOTAL=$(echo "$VERSIONS" | jq -s 'length')
            echo "- $IMAGE 当前版本数: $TOTAL" >> $GITHUB_STEP_SUMMARY
            
            if [ "$TOTAL" -gt ${{ env.KEEP_VERSIONS }} ]; then
              # 获取需要删除的版本 ID（保留最新的 KEEP_VERSIONS 个）
              DELETE_IDS=$(echo "$VERSIONS" | jq -r '.id' | tail -n +$((${{ env.KEEP_VERSIONS }} + 1)))
              
              for ID in $DELETE_IDS; do
                echo "  删除版本 $ID..." >> $GITHUB_STEP_SUMMARY
                gh api --method DELETE /users/${{ env.GITHUB_USER }}/packages/container/$IMAGE/versions/$ID || true
              done
            fi
          done

  update-state:
    needs: [check-upstream, build]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update upstream state file
        run: |
          MIROFISH_DATE=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/commits/main" | jq -r '.commit.committer.date')
          OPENZEP_DATE=$(curl -s "https://api.github.com/repos/N1nEmAn/openzep/commits/main" | jq -r '.commit.committer.date')
          
          cat > .github/upstream-state.json << EOF
          {
            "mirofish": {
              "sha": "${{ needs.check-upstream.outputs.mirofish_sha }}",
              "updated_at": "$MIROFISH_DATE",
              "version": "${{ needs.check-upstream.outputs.mirofish_version }}"
            },
            "openzep": {
              "sha": "${{ needs.check-upstream.outputs.openzep_sha }}",
              "updated_at": "$OPENZEP_DATE",
              "version": "${{ needs.check-upstream.outputs.openzep_version }}"
            },
            "last_build": "$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Update UPDATES.md
        if: needs.check-upstream.outputs.has_changes == 'true'
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d')
          MIROFISH_COMMITS="${{ needs.check-upstream.outputs.mirofish_commits }}"
          OPENZEP_COMMITS="${{ needs.check-upstream.outputs.openzep_commits }}"
          
          NEW_SECTION="## $BUILD_DATE\n\n"
          
          if [ -n "$MIROFISH_COMMITS" ]; then
            NEW_SECTION+="### MiroFish\n\n"
            NEW_SECTION+="$MIROFISH_COMMITS\n\n"
          fi
          
          if [ -n "$OPENZEP_COMMITS" ]; then
            NEW_SECTION+="### OpenZep\n\n"
            NEW_SECTION+="$OPENZEP_COMMITS\n\n"
          fi
          
          NEW_SECTION+="---\n\n"
          
          if [ -f "UPDATES.md" ]; then
            awk -v new="$NEW_SECTION" '
              /^---$/ { print; if (++count == 1) { printf "%s", new }; next }
              { print }
            ' UPDATES.md > UPDATES.md.tmp && mv UPDATES.md.tmp UPDATES.md
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/upstream-state.json UPDATES.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update upstream state [skip ci]"
          git push

  summary:
    needs: [check-upstream, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate build summary
        run: |
          echo "## 🐳 ARM64 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 版本 | 地址 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| MiroFish | \`${{ needs.check-upstream.outputs.mirofish_version }}-arm64\` | \`ghcr.io/slashinchi/mirofish:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenZep | \`${{ needs.check-upstream.outputs.openzep_version }}-arm64\` | \`ghcr.io/slashinchi/openzep:latest\` |" >> $GITHUB_STEP_SUMMARY

  skip-summary:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Generate skip summary
        run: |
          echo "## ⏭️ 构建已跳过" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "上游仓库无更新，跳过本次构建。" >> $GITHUB_STEP_SUMMARY