name: Build ARM64 Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建（跳过上游检测）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # Weekly rebuild on Sunday at 2:00 UTC
    - cron: '0 2 * * 0'

env:
  REGISTRY: ghcr.io
  GITHUB_USER: slashinchi
  # 强制使用 Node.js 24，消除弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# 并发控制：同一分支/标签的新构建会取消正在进行的构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 检测上游仓库是否有更新
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      mirofish_changed: ${{ steps.check.outputs.mirofish_changed }}
      openzep_changed: ${{ steps.check.outputs.openzep_changed }}
      should_build: ${{ steps.check.outputs.should_build }}
      mirofish_sha: ${{ steps.check.outputs.mirofish_sha }}
      openzep_sha: ${{ steps.check.outputs.openzep_sha }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Load upstream state
        id: load-state
        run: |
          if [ -f ".github/upstream-state.json" ]; then
            echo "state_file_exists=true" >> $GITHUB_OUTPUT
            cat .github/upstream-state.json
          else
            echo "state_file_exists=false" >> $GITHUB_OUTPUT
            echo '{"mirofish":{"sha":""},"openzep":{"sha":""}}' > .github/upstream-state.json
          fi

      - name: Check upstream changes
        id: check
        run: |
          # 获取上游最新 SHA
          MIROFISH_SHA=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/commits/main" | jq -r '.sha')
          OPENZEP_SHA=$(curl -s "https://api.github.com/repos/N1nEmAn/openzep/commits/main" | jq -r '.sha')
          
          echo "mirofish_sha=$MIROFISH_SHA" >> $GITHUB_OUTPUT
          echo "openzep_sha=$OPENZEP_SHA" >> $GITHUB_OUTPUT
          
          # 读取上次构建的 SHA
          LAST_MIROFISH_SHA=$(jq -r '.mirofish.sha' .github/upstream-state.json)
          LAST_OPENZEP_SHA=$(jq -r '.openzep.sha' .github/upstream-state.json)
          
          echo "📊 Upstream Status:"
          echo "  MiroFish: $MIROFISH_SHA (last built: $LAST_MIROFISH_SHA)"
          echo "  OpenZep:  $OPENZEP_SHA (last built: $LAST_OPENZEP_SHA)"
          
          # 判断是否有变化
          if [ "$MIROFISH_SHA" != "$LAST_MIROFISH_SHA" ]; then
            echo "mirofish_changed=true" >> $GITHUB_OUTPUT
            echo "✅ MiroFish has new commits"
          else
            echo "mirofish_changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ MiroFish unchanged"
          fi
          
          if [ "$OPENZEP_SHA" != "$LAST_OPENZEP_SHA" ]; then
            echo "openzep_changed=true" >> $GITHUB_OUTPUT
            echo "✅ OpenZep has new commits"
          else
            echo "openzep_changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ OpenZep unchanged"
          fi
          
          # 构建决策
          if [ "${{ github.event_name }}" == "push" ] || [ "${{ inputs.force_build }}" == "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "🚀 Building due to tag push or force build"
          elif [ "$MIROFISH_SHA" != "$LAST_MIROFISH_SHA" ] || [ "$OPENZEP_SHA" != "$LAST_OPENZEP_SHA" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "🚀 Building due to upstream changes"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping build - no upstream changes"
          fi

  # 使用 matrix 策略构建镜像
  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mirofish
            repo: 666ghj/MiroFish
            image: mirofish
          - name: openzep
            repo: N1nEmAn/openzep
            image: openzep

    steps:
      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get upstream commit info
        id: upstream-info
        run: |
          UPSTREAM_SHA=$(git rev-parse HEAD)
          UPSTREAM_DATE=$(git log -1 --format=%ci HEAD)
          echo "sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "date=$UPSTREAM_DATE" >> $GITHUB_OUTPUT
          echo "📦 Building ${{ matrix.name }} from commit: $UPSTREAM_SHA ($UPSTREAM_DATE)"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=arm64
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Show build result
        run: |
          echo "### ${{ matrix.name }} 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Upstream**: ${{ steps.upstream-info.outputs.sha }}" >> $GITHUB_STEP_SUMMARY

    outputs:
      mirofish_sha: ${{ steps.upstream-info.outputs.sha }}
      mirofish_date: ${{ steps.upstream-info.outputs.date }}
      openzep_sha: ${{ steps.upstream-info.outputs.sha }}
      openzep_date: ${{ steps.upstream-info.outputs.date }}

  # 更新状态文件
  update-state:
    needs: [check-upstream, build]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update upstream state file
        run: |
          # 获取当前时间
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          
          # 获取上游 commit 时间
          MIROFISH_DATE=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/commits/main" | jq -r '.commit.committer.date')
          OPENZEP_DATE=$(curl -s "https://api.github.com/repos/N1nEmAn/openzep/commits/main" | jq -r '.commit.committer.date')
          
          # 更新状态文件
          cat > .github/upstream-state.json << EOF
          {
            "mirofish": {
              "sha": "${{ needs.check-upstream.outputs.mirofish_sha }}",
              "updated_at": "$MIROFISH_DATE"
            },
            "openzep": {
              "sha": "${{ needs.check-upstream.outputs.openzep_sha }}",
              "updated_at": "$OPENZEP_DATE"
            },
            "last_build": "$BUILD_TIME"
          }
          EOF
          
          echo "📝 Updated upstream-state.json:"
          cat .github/upstream-state.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/upstream-state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update upstream state after build [skip ci]"
          git push

  # 构建摘要
  summary:
    needs: [check-upstream, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate build summary
        run: |
          echo "## 🐳 ARM64 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 标签 | 地址 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| MiroFish | latest, arm64 | \`ghcr.io/slashinchi/mirofish:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenZep | latest, arm64 | \`ghcr.io/slashinchi/openzep:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 上游仓库状态" >> $GITHUB_STEP_SUMMARY
          echo "- MiroFish: ${{ needs.check-upstream.outputs.mirofish_changed == 'true' && '有更新 ✅' || '无变化' }}" >> $GITHUB_STEP_SUMMARY
          echo "- OpenZep: ${{ needs.check-upstream.outputs.openzep_changed == 'true' && '有更新 ✅' || '无变化' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 触发方式" >> $GITHUB_STEP_SUMMARY
          echo "- 事件类型: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 触发时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  # 跳过构建时的摘要
  skip-summary:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Generate skip summary
        run: |
          echo "## ⏭️ 构建已跳过" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "上游仓库无更新，跳过本次定时构建。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 检测状态" >> $GITHUB_STEP_SUMMARY
          echo "- MiroFish: ${{ needs.check-upstream.outputs.mirofish_changed == 'true' && '有更新' || '无变化' }}" >> $GITHUB_STEP_SUMMARY
          echo "- OpenZep: ${{ needs.check-upstream.outputs.openzep_changed == 'true' && '有更新' || '无变化' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 下次检查" >> $GITHUB_STEP_SUMMARY
          echo "- 下周日 02:00 UTC（北京时间 10:00）" >> $GITHUB_STEP_SUMMARY