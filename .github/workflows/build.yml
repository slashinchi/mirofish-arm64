name: Build ARM64 Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建（跳过上游检测）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # Weekly rebuild on Sunday at 2:00 UTC
    - cron: '0 2 * * 0'

env:
  REGISTRY: ghcr.io
  GITHUB_USER: slashinchi

# 并发控制：同一分支/标签的新构建会取消正在进行的构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 检测上游仓库是否有更新
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      mirofish_changed: ${{ steps.check-mirofish.outputs.changed }}
      openzep_changed: ${{ steps.check-openzep.outputs.changed }}
      should_build: ${{ steps.decision.outputs.should_build }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check MiroFish upstream
        id: check-mirofish
        run: |
          # 获取上游最新 commit
          UPSTREAM_SHA=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/commits/main" | jq -r '.sha')
          echo "upstream_mirofish_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

          # 获取上次构建记录的上游 commit（从 git tag 或文件读取）
          LAST_BUILD_SHA=$(git log --grep="mirofish-upstream:" --oneline -1 | grep -oP 'mirofish-upstream:\K[a-f0-9]+' || echo "")

          if [ "$UPSTREAM_SHA" != "$LAST_BUILD_SHA" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "MiroFish upstream has new commits: $UPSTREAM_SHA"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "MiroFish upstream unchanged"
          fi

      - name: Check OpenZep upstream
        id: check-openzep
        run: |
          UPSTREAM_SHA=$(curl -s "https://api.github.com/repos/N1nEmAn/openzep/commits/main" | jq -r '.sha')
          echo "upstream_openzep_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

          LAST_BUILD_SHA=$(git log --grep="openzep-upstream:" --oneline -1 | grep -oP 'openzep-upstream:\K[a-f0-9]+' || echo "")

          if [ "$UPSTREAM_SHA" != "$LAST_BUILD_SHA" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "OpenZep upstream has new commits: $UPSTREAM_SHA"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "OpenZep upstream unchanged"
          fi

      - name: Build decision
        id: decision
        run: |
          # 如果是 tag 推送或手动触发强制构建，直接构建
          if [ "${{ github.event_name }}" == "push" ] || [ "${{ inputs.force_build }}" == "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Building due to tag push or force build"
          # 如果是定时触发，检查上游是否有更新
          elif [ "${{ steps.check-mirofish.outputs.changed }}" == "true" ] || [ "${{ steps.check-openzep.outputs.changed }}" == "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Building due to upstream changes"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Skipping build - no upstream changes"
          fi

  # 使用 matrix 策略构建镜像
  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mirofish
            repo: 666ghj/MiroFish
            image: mirofish
          - name: openzep
            repo: N1nEmAn/openzep
            image: openzep

    steps:
      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get upstream commit SHA
        id: upstream-sha
        run: |
          UPSTREAM_SHA=$(git rev-parse HEAD)
          echo "sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "Upstream ${{ matrix.name }} commit: $UPSTREAM_SHA"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=arm64
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/${{ matrix.image }}:latest 2>/dev/null || echo "N/A")
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Save build info
        run: |
          echo "${{ matrix.name }}-upstream-sha=${{ steps.upstream-sha.outputs.sha }}" >> $GITHUB_ENV

    outputs:
      mirofish_upstream_sha: ${{ steps.upstream-sha.outputs.sha }}
      openzep_upstream_sha: ${{ steps.upstream-sha.outputs.sha }}

  # 构建摘要
  summary:
    needs: [check-upstream, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate build summary
        run: |
          echo "## 🐳 ARM64 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 标签 | 地址 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| MiroFish | latest, arm64 | \`${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/mirofish:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenZep | latest, arm64 | \`${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/openzep:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 上游仓库状态" >> $GITHUB_STEP_SUMMARY
          echo "- MiroFish: ${{ needs.check-upstream.outputs.mirofish_changed == 'true' && '有更新 ✅' || '无变化' }}" >> $GITHUB_STEP_SUMMARY
          echo "- OpenZep: ${{ needs.check-upstream.outputs.openzep_changed == 'true' && '有更新 ✅' || '无变化' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 触发方式" >> $GITHUB_STEP_SUMMARY
          echo "- 事件类型: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 触发时间: ${{ github.event.head_commit.timestamp || 'N/A' }}" >> $GITHUB_STEP_SUMMARY

  # 跳过构建时的摘要
  skip-summary:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Generate skip summary
        run: |
          echo "## ⏭️ 构建已跳过" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "上游仓库无更新，跳过本次定时构建。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 检测状态" >> $GITHUB_STEP_SUMMARY
          echo "- MiroFish: 无变化" >> $GITHUB_STEP_SUMMARY
          echo "- OpenZep: 无变化" >> $GITHUB_STEP_SUMMARY
