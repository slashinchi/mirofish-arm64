name: Build ARM64 Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建（跳过上游检测）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # Weekly rebuild on Sunday at 2:00 UTC
    - cron: '0 2 * * 0'

env:
  REGISTRY: ghcr.io
  GITHUB_USER: slashinchi
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      mirofish_changed: ${{ steps.check.outputs.mirofish_changed }}
      openzep_changed: ${{ steps.check.outputs.openzep_changed }}
      should_build: ${{ steps.check.outputs.should_build }}
      mirofish_sha: ${{ steps.check.outputs.mirofish_sha }}
      openzep_sha: ${{ steps.check.outputs.openzep_sha }}
      mirofish_commits: ${{ steps.commits.outputs.mirofish }}
      openzep_commits: ${{ steps.commits.outputs.openzep }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Load upstream state
        run: |
          if [ ! -f ".github/upstream-state.json" ]; then
            echo '{"mirofish":{"sha":""},"openzep":{"sha":""}}' > .github/upstream-state.json
          fi

      - name: Check upstream changes
        id: check
        run: |
          MIROFISH_SHA=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/commits/main" | jq -r '.sha')
          OPENZEP_SHA=$(curl -s "https://api.github.com/repos/N1nEmAn/openzep/commits/main" | jq -r '.sha')
          
          echo "mirofish_sha=$MIROFISH_SHA" >> $GITHUB_OUTPUT
          echo "openzep_sha=$OPENZEP_SHA" >> $GITHUB_OUTPUT
          
          LAST_MIROFISH_SHA=$(jq -r '.mirofish.sha' .github/upstream-state.json)
          LAST_OPENZEP_SHA=$(jq -r '.openzep.sha' .github/upstream-state.json)
          
          echo "📊 Upstream Status:"
          echo "  MiroFish: $MIROFISH_SHA (last: $LAST_MIROFISH_SHA)"
          echo "  OpenZep:  $OPENZEP_SHA (last: $LAST_OPENZEP_SHA)"
          
          [ "$MIROFISH_SHA" != "$LAST_MIROFISH_SHA" ] && echo "mirofish_changed=true" >> $GITHUB_OUTPUT || echo "mirofish_changed=false" >> $GITHUB_OUTPUT
          [ "$OPENZEP_SHA" != "$LAST_OPENZEP_SHA" ] && echo "openzep_changed=true" >> $GITHUB_OUTPUT || echo "openzep_changed=false" >> $GITHUB_OUTPUT
          
          if [ "${{ github.event_name }}" == "push" ] || [ "${{ inputs.force_build }}" == "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [ "$MIROFISH_SHA" != "$LAST_MIROFISH_SHA" ] || [ "$OPENZEP_SHA" != "$LAST_OPENZEP_SHA" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch new commits info
        id: commits
        run: |
          LAST_MIROFISH_SHA=$(jq -r '.mirofish.sha' .github/upstream-state.json)
          LAST_OPENZEP_SHA=$(jq -r '.openzep.sha' .github/upstream-state.json)
          
          # Fetch MiroFish commits since last build
          if [ "${{ steps.check.outputs.mirofish_changed }}" == "true" ] && [ -n "$LAST_MIROFISH_SHA" ]; then
            MIROFISH_COMMITS=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/compare/${LAST_MIROFISH_SHA}...main" | \
              jq -r '.commits[] | "- `\(.sha[:7])` - \(.commit.message | split("\n")[0])"' | head -10)
            echo "mirofish<<EOF" >> $GITHUB_OUTPUT
            echo "$MIROFISH_COMMITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
          
          # Fetch OpenZep commits since last build
          if [ "${{ steps.check.outputs.openzep_changed }}" == "true" ] && [ -n "$LAST_OPENZEP_SHA" ]; then
            OPENZEP_COMMITS=$(curl -s "https://api.github.com/repos/N1nEmAn/openzep/compare/${LAST_OPENZEP_SHA}...main" | \
              jq -r '.commits[] | "- `\(.sha[:7])` - \(.commit.message | split("\n")[0])"' | head -10)
            echo "openzep<<EOF" >> $GITHUB_OUTPUT
            echo "$OPENZEP_COMMITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mirofish
            repo: 666ghj/MiroFish
            image: mirofish
          - name: openzep
            repo: N1nEmAn/openzep
            image: openzep

    steps:
      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GITHUB_USER }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=arm64
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  update-state:
    needs: [check-upstream, build]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update upstream state file
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d')
          MIROFISH_DATE=$(curl -s "https://api.github.com/repos/666ghj/MiroFish/commits/main" | jq -r '.commit.committer.date')
          OPENZEP_DATE=$(curl -s "https://api.github.com/repos/N1nEmAn/openzep/commits/main" | jq -r '.commit.committer.date')
          
          cat > .github/upstream-state.json << EOF
          {
            "mirofish": {
              "sha": "${{ needs.check-upstream.outputs.mirofish_sha }}",
              "updated_at": "$MIROFISH_DATE"
            },
            "openzep": {
              "sha": "${{ needs.check-upstream.outputs.openzep_sha }}",
              "updated_at": "$OPENZEP_DATE"
            },
            "last_build": "$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Update UPDATES.md
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d')
          MIROFISH_COMMITS="${{ needs.check-upstream.outputs.mirofish_commits }}"
          OPENZEP_COMMITS="${{ needs.check-upstream.outputs.openzep_commits }}"
          
          # Create new section
          NEW_SECTION=""
          NEW_SECTION+="## $BUILD_DATE\n\n"
          
          if [ -n "$MIROFISH_COMMITS" ]; then
            NEW_SECTION+="### MiroFish\n\n"
            NEW_SECTION+="$MIROFISH_COMMITS\n\n"
          fi
          
          if [ -n "$OPENZEP_COMMITS" ]; then
            NEW_SECTION+="### OpenZep\n\n"
            NEW_SECTION+="$OPENZEP_COMMITS\n\n"
          fi
          
          NEW_SECTION+="---\n\n"
          
          # Insert after header
          if [ -f "UPDATES.md" ]; then
            # Find the line after initial content (after first ---)
            sed -i "1,/^---$/!{0,/^---$/s/^---$/---\n\n$(echo -e "$NEW_SECTION" | sed 's/[\/&]/\\&/g')/}" UPDATES.md 2>/dev/null || \
            echo -e "$NEW_SECTION$(cat UPDATES.md)" > UPDATES.md
          else
            echo -e "# 更新日志\n\n本文件自动记录上游项目的更新。\n\n---\n\n$NEW_SECTION" > UPDATES.md
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/upstream-state.json UPDATES.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update upstream state and UPDATES.md [skip ci]"
          git push

  summary:
    needs: [check-upstream, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate build summary
        run: |
          echo "## 🐳 ARM64 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 地址 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| MiroFish | \`ghcr.io/slashinchi/mirofish:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenZep | \`ghcr.io/slashinchi/openzep:latest\` |" >> $GITHUB_STEP_SUMMARY

  skip-summary:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Generate skip summary
        run: |
          echo "## ⏭️ 构建已跳过" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "上游仓库无更新，跳过本次构建。" >> $GITHUB_STEP_SUMMARY