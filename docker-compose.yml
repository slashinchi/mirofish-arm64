services:
  neo4j:
    image: neo4j:5
    restart: always
    container_name: mirofish-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2G"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - ./data/neo4j:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-password123}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - mirofish-net

  openzep:
    image: ghcr.io/${GITHUB_USER:-slashinchi}/openzep:${IMAGE_TAG:-arm64}
    restart: always
    container_name: mirofish-openzep
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${OPENZEP_PORT:-8000}:8000"
    environment:
      # LLM Configuration
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      LLM_SMALL_MODEL: ${LLM_SMALL_MODEL:-qwen-plus}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      
      # Embedder (optional)
      EMBEDDER_MODEL: ${EMBEDDER_MODEL:-text-embedding-v3}
      EMBEDDER_API_KEY: ${EMBEDDER_API_KEY:-${LLM_API_KEY}}
      EMBEDDER_BASE_URL: ${EMBEDDER_BASE_URL:-${LLM_BASE_URL}}
      
      # Neo4j Connection
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}
      
      # OpenZep API
      ZEP_API_KEY: ${OPENZEP_API_KEY}
    volumes:
      - ./data/openzep:/app/data
    networks:
      - mirofish-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mirofish:
    image: ghcr.io/${GITHUB_USER:-slashinchi}/mirofish:${IMAGE_TAG:-arm64}
    restart: always
    container_name: mirofish-app
    depends_on:
      openzep:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
      - "${BACKEND_PORT:-5001}:5001"
    environment:
      # LLM Configuration
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-qwen-plus}
      
      # Boost LLM (optional, remove if not used)
      LLM_BOOST_API_KEY: ${LLM_BOOST_API_KEY:-}
      LLM_BOOST_BASE_URL: ${LLM_BOOST_BASE_URL:-}
      LLM_BOOST_MODEL_NAME: ${LLM_BOOST_MODEL_NAME:-}
      
      # Zep Configuration
      ZEP_API_KEY: ${OPENZEP_API_KEY}
      ZEP_BASE_URL: http://openzep:8000/api/v2
    volumes:
      - ./uploads:/app/backend/uploads
    networks:
      - mirofish-net

networks:
  mirofish-net:
    driver: bridge